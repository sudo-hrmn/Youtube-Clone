<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="k8sGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326ce5;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4285f4;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <rect x="200" y="20" width="400" height="40" rx="20" fill="url(#containerGradient)" stroke="#475569" stroke-width="1"/>
  <text x="400" y="45" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="16" font-weight="bold">YouTube Clone - Architecture</text>
  
  <!-- Kubernetes Cluster Container -->
  <rect x="50" y="100" width="700" height="450" rx="15" fill="url(#k8sGradient)" stroke="#326ce5" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="70" y="125" fill="#326ce5" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Kubernetes Cluster</text>
  
  <!-- Namespace Container -->
  <rect x="80" y="150" width="640" height="380" rx="10" fill="rgba(99, 179, 237, 0.1)" stroke="#63b3ed" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="175" fill="#63b3ed" font-family="Arial, sans-serif" font-size="12" font-weight="bold">youtube-clone-v1 namespace</text>
  
  <!-- Frontend Pods -->
  <rect x="120" y="200" width="180" height="120" rx="8" fill="url(#containerGradient)" stroke="#61dafb" stroke-width="2"/>
  <text x="210" y="225" text-anchor="middle" fill="#61dafb" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Frontend Pods (3x)</text>
  
  <!-- Pod 1 -->
  <rect x="130" y="240" width="45" height="30" rx="5" fill="#61dafb" stroke="#21d4fd" stroke-width="1"/>
  <text x="152" y="258" text-anchor="middle" fill="#1a202c" font-family="Arial, sans-serif" font-size="8" font-weight="bold">React</text>
  
  <!-- Pod 2 -->
  <rect x="185" y="240" width="45" height="30" rx="5" fill="#61dafb" stroke="#21d4fd" stroke-width="1"/>
  <text x="207" y="258" text-anchor="middle" fill="#1a202c" font-family="Arial, sans-serif" font-size="8" font-weight="bold">React</text>
  
  <!-- Pod 3 -->
  <rect x="240" y="240" width="45" height="30" rx="5" fill="#61dafb" stroke="#21d4fd" stroke-width="1"/>
  <text x="262" y="258" text-anchor="middle" fill="#1a202c" font-family="Arial, sans-serif" font-size="8" font-weight="bold">React</text>
  
  <!-- Nginx in pods -->
  <rect x="130" y="280" width="45" height="25" rx="3" fill="#009639" stroke="#4caf50" stroke-width="1"/>
  <text x="152" y="295" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="7">Nginx</text>
  
  <rect x="185" y="280" width="45" height="25" rx="3" fill="#009639" stroke="#4caf50" stroke-width="1"/>
  <text x="207" y="295" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="7">Nginx</text>
  
  <rect x="240" y="280" width="45" height="25" rx="3" fill="#009639" stroke="#4caf50" stroke-width="1"/>
  <text x="262" y="295" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="7">Nginx</text>
  
  <!-- Services -->
  <rect x="350" y="200" width="120" height="60" rx="8" fill="url(#containerGradient)" stroke="#fbbf24" stroke-width="2"/>
  <text x="410" y="225" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Services</text>
  <text x="410" y="240" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="9">ClusterIP</text>
  <text x="410" y="252" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="9">NodePort</text>
  
  <!-- Ingress -->
  <rect x="350" y="280" width="120" height="40" rx="8" fill="url(#containerGradient)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="410" y="305" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Ingress</text>
  
  <!-- HPA -->
  <rect x="500" y="200" width="100" height="40" rx="8" fill="url(#containerGradient)" stroke="#f59e0b" stroke-width="2"/>
  <text x="550" y="225" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">HPA</text>
  
  <!-- ConfigMaps & Secrets -->
  <rect x="500" y="260" width="100" height="60" rx="8" fill="url(#containerGradient)" stroke="#10b981" stroke-width="2"/>
  <text x="550" y="280" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">ConfigMaps</text>
  <text x="550" y="295" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Secrets</text>
  <text x="550" y="310" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="10" font-weight="bold">RBAC</text>
  
  <!-- Monitoring -->
  <rect x="120" y="350" width="180" height="60" rx="8" fill="url(#containerGradient)" stroke="#ef4444" stroke-width="2"/>
  <text x="210" y="375" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Monitoring</text>
  <text x="210" y="390" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="9">Health Checks</text>
  <text x="210" y="402" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="9">Metrics</text>
  
  <!-- Network Policies -->
  <rect x="350" y="350" width="120" height="60" rx="8" fill="url(#containerGradient)" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="375" text-anchor="middle" fill="#6366f1" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Network</text>
  <text x="410" y="387" text-anchor="middle" fill="#6366f1" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Policies</text>
  <text x="410" y="402" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="8">Security</text>
  
  <!-- Resource Quotas -->
  <rect x="500" y="350" width="100" height="60" rx="8" fill="url(#containerGradient)" stroke="#ec4899" stroke-width="2"/>
  <text x="550" y="375" text-anchor="middle" fill="#ec4899" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Resource</text>
  <text x="550" y="387" text-anchor="middle" fill="#ec4899" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Quotas</text>
  <text x="550" y="402" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="8">Limits</text>
  
  <!-- External Traffic -->
  <rect x="50" y="50" width="100" height="30" rx="15" fill="#1f2937" stroke="#6b7280" stroke-width="1"/>
  <text x="100" y="70" text-anchor="middle" fill="#f9fafb" font-family="Arial, sans-serif" font-size="11">🌐 Internet</text>
  
  <!-- ArgoCD -->
  <rect x="650" y="50" width="100" height="30" rx="15" fill="#ef6c00" stroke="#ff9800" stroke-width="1"/>
  <text x="700" y="70" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11">ArgoCD</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Traffic flow -->
  <line x1="150" y1="65" x2="350" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="470" y1="300" x2="300" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ArgoCD to cluster -->
  <line x1="650" y1="65" x2="400" y2="120" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- HPA to Pods -->
  <line x1="500" y1="220" x2="300" y2="260" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
  
  <!-- Labels -->
  <text x="250" y="45" fill="#64748b" font-family="Arial, sans-serif" font-size="9">HTTP Traffic</text>
  <text x="500" y="45" fill="#ef6c00" font-family="Arial, sans-serif" font-size="9">GitOps Sync</text>
  
  <!-- Footer -->
  <rect x="50" y="570" width="700" height="20" rx="10" fill="rgba(51, 65, 85, 0.5)"/>
  <text x="400" y="583" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">High Availability • Auto-Scaling • Security • Monitoring</text>
</svg>
