# YouTube Clone - Monitoring Application
# Prometheus, Grafana, ServiceMonitor

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: youtube-clone-monitoring
  namespace: argocd
  labels:
    app: youtube-clone
    component: monitoring
    version: v1
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  # Source configuration
  source:
    repoURL: https://github.com/sudo-hrmn/Youtube-Clone.git
    targetRevision: main
    path: kubernetes/monitoring
  
  # Destination configuration
  destination:
    server: https://kubernetes.default.svc
    namespace: youtube-clone-monitoring
  
  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
  
  # Health check configuration
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  
  # Revision history limit
  revisionHistoryLimit: 5
