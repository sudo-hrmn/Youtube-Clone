# YouTube Clone - App of Apps Pattern
# Parent application that manages all child applications

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: youtube-clone-platform
  namespace: argocd
  labels:
    app: youtube-clone
    version: v1
    type: app-of-apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  # Source configuration
  source:
    repoURL: https://github.com/sudo-hrmn/Youtube-Clone.git
    targetRevision: main
    path: argocd-apps/applications
  
  # Destination configuration
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Ignore differences
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  - group: ""
    kind: Service
    jsonPointers:
    - /spec/clusterIP
  
  # Revision history limit
  revisionHistoryLimit: 10
