# YouTube Clone - ArgoCD Project
# Project configuration for YouTube Clone applications

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: youtube-clone-project
  namespace: argocd
  labels:
    app: youtube-clone
    version: v1
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: YouTube Clone Platform Project
  
  # Source repositories
  sourceRepos:
  - 'https://github.com/sudo-hrmn/Youtube-Clone.git'
  - 'https://github.com/sudo-hrmn/*'
  
  # Destination clusters and namespaces
  destinations:
  - namespace: 'youtube-clone-*'
    server: https://kubernetes.default.svc
  - namespace: argocd
    server: https://kubernetes.default.svc
  - namespace: monitoring
    server: https://kubernetes.default.svc
  
  # Cluster resource whitelist
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  - group: rbac.authorization.k8s.io
    kind: ClusterRole
  - group: rbac.authorization.k8s.io
    kind: ClusterRoleBinding
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
  - group: networking.k8s.io
    kind: IngressClass
  
  # Namespace resource whitelist
  namespaceResourceWhitelist:
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Secret
  - group: ''
    kind: Service
  - group: ''
    kind: ServiceAccount
  - group: apps
    kind: Deployment
  - group: apps
    kind: ReplicaSet
  - group: ''
    kind: Pod
  - group: networking.k8s.io
    kind: Ingress
  - group: networking.k8s.io
    kind: NetworkPolicy
  - group: autoscaling
    kind: HorizontalPodAutoscaler
  - group: policy
    kind: PodDisruptionBudget
  - group: monitoring.coreos.com
    kind: ServiceMonitor
  - group: rbac.authorization.k8s.io
    kind: Role
  - group: rbac.authorization.k8s.io
    kind: RoleBinding
  
  # Roles
  roles:
  - name: admin
    description: Admin access to YouTube Clone project
    policies:
    - p, proj:youtube-clone-project:admin, applications, *, youtube-clone-project/*, allow
    - p, proj:youtube-clone-project:admin, repositories, *, *, allow
    - p, proj:youtube-clone-project:admin, clusters, *, *, allow
    groups:
    - youtube-clone:admin
  
  - name: developer
    description: Developer access to YouTube Clone project
    policies:
    - p, proj:youtube-clone-project:developer, applications, get, youtube-clone-project/*, allow
    - p, proj:youtube-clone-project:developer, applications, sync, youtube-clone-project/*, allow
    - p, proj:youtube-clone-project:developer, repositories, get, *, allow
    groups:
    - youtube-clone:developer
  
  - name: readonly
    description: Read-only access to YouTube Clone project
    policies:
    - p, proj:youtube-clone-project:readonly, applications, get, youtube-clone-project/*, allow
    - p, proj:youtube-clone-project:readonly, repositories, get, *, allow
    groups:
    - youtube-clone:readonly
  
  # Sync windows
  syncWindows:
  - kind: allow
    schedule: '* * * * *'
    duration: 24h
    applications:
    - '*'
    manualSync: true
  
  # Signature keys
  signatureKeys:
  - keyID: youtube-clone-signing-key
