# ArgoCD NodePort Service for External Access
# Provides easy access to ArgoCD UI via localhost:30080

apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: argocd
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  ports:
  - port: 80
    protocol: TCP
    targetPort: 8080
    nodePort: 30080
    name: http
  - port: 443
    protocol: TCP
    targetPort: 8080
    nodePort: 30443
    name: https
  selector:
    app.kubernetes.io/name: argocd-server
