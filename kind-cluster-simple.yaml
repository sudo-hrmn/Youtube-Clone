# Simplified Kind Cluster Configuration for YouTube Clone V1
# Single-node cluster with ingress support for reliable deployment

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: youtube-clone-v1

# Single control-plane node configuration
nodes:
  - role: control-plane
    image: kindest/node:v1.28.0@sha256:b7a4cad12c197af3ba43202d3efe03246b3f0793f162afb40a33c923952d5b31
    kubeadmConfigPatches:
    - |
      kind: InitConfiguration
      nodeRegistration:
        kubeletExtraArgs:
          node-labels: "ingress-ready=true"
    extraPortMappings:
    # HTTP port mapping for ingress
    - containerPort: 80
      hostPort: 80
      protocol: TCP
    # HTTPS port mapping for ingress
    - containerPort: 443
      hostPort: 443
      protocol: TCP
    # NodePort range for services
    - containerPort: 30000
      hostPort: 30000
      protocol: TCP
    - containerPort: 30001
      hostPort: 30001
      protocol: TCP
    - containerPort: 30002
      hostPort: 30002
      protocol: TCP

# Networking configuration
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
